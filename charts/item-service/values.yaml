replicaCount: 1
image:
  repository: ghcr.io/shareify-project/shareify-item-service
  pullPolicy: Always
  tag: "latest"
imagePullSecrets:
  - name: ghcr-secret
env:
  databaseUrl: "postgresql://postgres:shareify-secure-db-pass@postgres-db:5432/item_service"
service:
  type: ClusterIP
  port: 8000
persistence:
  enabled: true
  storageClass: "nfs-client"
  size: 1Gi
  mountPath: /app/data
resources:
  limits:
    cpu: 100m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

config: {}
secrets: {}










