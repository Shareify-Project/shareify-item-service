replicaCount: 1
image:
  repository: ghcr.io/shareify-project/shareify-item-service
  pullPolicy: Always
  tag: "742c2c5"
imagePullSecrets:
  - name: ghcr-secret
env:
  databasePath: "/app/data/item.db"
service:
  type: ClusterIP
  port: 8000
persistence:
  enabled: true
  storageClass: "nfs-client"
  size: 1Gi
  mountPath: /app/data
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 16Mi

config: {}
secrets: {}


